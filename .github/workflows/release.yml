name: Release

on:
  release:
    types: [published]

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Package extension
        run: npm run pack

      - name: Upload VSIX
        uses: softprops/action-gh-release@v2
        with:
          files: '*.vsix'
